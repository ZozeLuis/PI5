<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastros - HamburgueriaIA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">HamburgueriaIA</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Dashboard</a>
                <a class="nav-link active" href="cadastro.html">Cadastros</a>
                <a class="nav-link" href="estoque.html">Estoque</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <h5><i class="bi bi-egg-fried"></i> Novo Ingrediente</h5>
                    <small class="text-muted">Ex: Pão, Carne, Queijo, Bacon</small>
                    <form id="formIngrediente" class="mt-3">
                        <div class="mb-3">
                            <label class="form-label">Nome do Ingrediente</label>
                            <input type="text" class="form-control" id="nomeItem" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Unidade (Un, Kg, G)</label>
                            <select class="form-select" id="unidadeItem">
                                <option value="un">Unidade (un)</option>
                                <option value="kg">Quilo (kg)</option>
                                <option value="g">Gramas (g)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Salvar Ingrediente</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-4 border-primary h-100">
                    <h5><i class="bi bi-reception-4"></i> Novo Produto (Cardápio)</h5>
                    <small class="text-muted">Defina o nome e o preço de venda</small>
                    <form id="formProduto" class="mt-3">
                        <div class="mb-3">
                            <label class="form-label">Nome do Lanche</label>
                            <input type="text" class="form-control" id="nomeProd" placeholder="Ex: X-Bacon Supremo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Preço de Venda (R$)</label>
                            <input type="number" class="form-control" id="precoProd" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Cadastrar no Cardápio</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card shadow-sm p-4 border-warning">
                    <h5><i class="bi bi-list-stars"></i> Montar Composição (Ficha Técnica)</h5>
                    <p class="text-muted small">Vincule os ingredientes a um produto do cardápio.</p>
                    
                    <form id="formComposicao" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Selecionar Produto</label>
                            <select class="form-select" id="selectProduto">
                                <option value="">Carregando produtos...</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Selecionar Ingrediente</label>
                            <select class="form-select" id="selectIngrediente">
                                <option value="">Carregando itens...</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Quantidade</label>
                            <input type="number" class="form-control" id="qtdNecessaria" placeholder="Ex: 1" step="0.001" required>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-warning w-100">Vincular</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
