<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastros - HamburgueriaIA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">HamburguerIA</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Dashboard</a>
                <a class="nav-link active" href="cadastro.html">Cadastros</a>
                <a class="nav-link" href="estoque.html">Estoque</a>
                <a class="nav-link active" href="ia.html">Previsões com IA</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Coluna da Esquerda: Cadastro de Ingredientes Simples -->
            <div class="col-md-4">
                <div class="card shadow-sm p-4 h-100">
                    <h5><i class="bi bi-egg-fried"></i> Novo Ingrediente</h5>
                    <small class="text-muted">Itens base para o estoque</small>
                    <form id="formIngrediente" class="mt-3">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" id="nomeItem" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Unidade</label>
                            <select class="form-select" id="unidadeItem">
                                <option value="un">Unidade (un)</option>
                                <option value="kg">Quilo (kg)</option>
                                <option value="g">Gramas (g)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Salvar Ingrediente</button>
                    </form>
                </div>
            </div>

            <!-- Coluna da Direita: Novo Produto com Composição Dinâmica -->
            <div class="col-md-8">
                <div class="card shadow-sm p-4 border-success h-100">
                    <h5 id="tituloFormProduto"><i class="bi bi-reception-4"></i> Cadastrar Produto Completo</h5>
                    <small class="text-muted">Defina o lanche e seus ingredientes de uma vez</small>
                    
                    <form id="formProduto" class="mt-3">
                        <input type="hidden" id="idProdutoEdicao"> <!-- Campo oculto para quando for editar -->
                        
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label">Nome do Lanche</label>
                                <input type="text" class="form-control" id="nomeProd" placeholder="Ex: X-Bacon Supremo" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Preço (R$)</label>
                                <input type="number" class="form-control" id="precoProd" step="0.01" required>
                            </div>
                        </div>

                        <div id="secaoIngredientes" class="border rounded p-3 bg-light">
                            <h6>Ingredientes do Lanche</h6>
                            <div id="containerIngredientesDinamicos">
                                <!-- As linhas de ingredientes entrarão aqui via JS -->
                            </div>
                            <button type="button" class="btn btn-outline-secondary btn-sm mt-2" onclick="adicionarLinhaIngrediente()">
                                <i class="bi bi-plus-circle"></i> Adicionar Ingrediente
                            </button>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-success flex-grow-1" id="btnSalvarProduto">Salvar no Cardápio</button>
                            <button type="button" class="btn btn-secondary" id="btnCancelarEdicao" style="display:none;" onclick="resetarFormularioProduto()">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Nova Linha: Lista de Produtos para Edição -->
        <div class="row mt-5">
            <div class="col-12">
                <div class="card shadow-sm p-4">
                    <h5><i class="bi bi-card-list"></i> Produtos Cadastrados</h5>
                    <div class="table-responsive">
                        <table class="table table-hover mt-3">
                            <thead class="table-dark">
                                <tr>
                                    <th>Produto</th>
                                    <th>Preço</th>
                                    <th>Composição</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaProdutosCorpo">
                                <!-- Linhas preenchidas pelo script.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
